version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/saas"
    schema: "migrations/saas"
    gen:
      go:
        package: "saasdb"
        out: "internal/db/saas"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
  - engine: "postgresql"
    queries: "db/queries/cnpj"
    schema: "db/schema/cnpj.sql"
    gen:
      go:
        package: "cnpjdb"
        out: "internal/db/cnpj"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
