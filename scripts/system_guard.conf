# System guard thresholds — tune for your machine (31 GB RAM defaults).
# Available memory % (MemAvailable / MemTotal)
GUARD_MEM_WARN_PCT=25
GUARD_MEM_THROTTLE_PCT=18
GUARD_MEM_ABORT_PCT=5
GUARD_MEM_ABORT_MB=1024

# Swap usage % — heavy swap = imminent freeze
GUARD_SWAP_ABORT_PCT=60

# Load average per core (load1 / nproc)
GUARD_LOAD_THROTTLE_RATIO=1.8
GUARD_LOAD_ABORT_RATIO=3.0

# Root filesystem free space (MB)
GUARD_DISK_ABORT_MB=2048

# Polling and hysteresis
GUARD_INTERVAL_SEC=3
GUARD_THROTTLE_STREAK=2
GUARD_ABORT_STREAK=2
GUARD_RESUME_STREAK=4
