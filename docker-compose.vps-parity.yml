# VPS API parity — production PostgreSQL profile (plan 02 Phase 2).
# Use AFTER full import (import-dev flags live in base docker-compose.yml).
#
#   docker compose -f docker-compose.yml -f docker-compose.vps-parity.yml up -d postgres --force-recreate
#
# See: docs/ops/LOCAL-VPS-PARITY.md

services:
  postgres:
    shm_size: 4gb
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_trgm.similarity_threshold=0.45
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=12GB
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=2GB
      - -c
      - max_connections=100
      - -c
      - wal_level=replica
      - -c
      - full_page_writes=on
      - -c
      - fsync=on
      - -c
      - synchronous_commit=on
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - checkpoint_timeout=15min
      - -c
      - max_wal_size=4GB
      - -c
      - min_wal_size=1GB
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - max_worker_processes=8
      - -c
      - max_parallel_workers=8
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - max_parallel_maintenance_workers=4
      - -c
      - enable_partitionwise_join=on
      - -c
      - enable_partitionwise_aggregate=on
      - -c
      - enable_partition_pruning=on
      - -c
      - autovacuum=on
      - -c
      - autovacuum_max_workers=4
      - -c
      - autovacuum_naptime=30s
      - -c
      - autovacuum_vacuum_scale_factor=0.05
      - -c
      - autovacuum_analyze_scale_factor=0.02
      - -c
      - autovacuum_vacuum_cost_delay=2ms
      - -c
      - autovacuum_vacuum_cost_limit=1000
      - -c
      - lock_timeout=30s
      - -c
      - idle_in_transaction_session_timeout=60000
