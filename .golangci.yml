run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - cyclop
    - dupl
    - exhaustive
    - forcetypeassert
    - godot
    - gofmt
    - goimports
    - gocritic
    - gosec
    - lll
    - misspell
    - nakedret
    - nilerr
    - noctx
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - whitespace

linters-settings:
  cyclop:
    max-complexity: 20
  lll:
    line-length: 120
  gocritic:
    enabled-tags: [diagnostic, performance, style]
    disabled-checks:
      - hugeParam
      - unnamedResult
      - exitAfterDefer
      - filepathJoin
      - rangeValCopy
  gosec:
    excludes:
      - G101
      - G115
      - G306
  misspell:
    ignore-words:
      - federativo

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: internal/importer/
      linters:
        - unused
        - unparam
    - path: internal/importer/
      text: "unused-parameter"
      linters:
        - revive
    - path: _test\.go
      linters:
        - bodyclose
        - dupl
        - revive
        - unconvert
        - contextcheck
    - path: internal/perfvalidation/
      linters:
        - dupl
    - path: internal/database/(cnpj_pgx|saas_pgx)\.go
      linters:
        - dupl
    - path: cmd/
      linters:
        - cyclop
    - path: internal/saas/
      linters:
        - contextcheck
