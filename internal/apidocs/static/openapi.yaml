openapi: 3.1.0
info:
  title: OpenCNPJ API
  version: 1.0.0
  description: |
    Brazilian CNPJ lookup API (Receita Federal open data).
    Authenticate with the `X-API-Key` header.

    Changelog: `docs/api/CHANGELOG.md` · Errors: `docs/api/ERRORS.md`
  license:
    name: MIT OR Apache-2.0
    url: https://github.com/AlexandreZanata/BUSCA-CNPJ-2026/blob/main/docs/LICENSING.md

servers:
  - url: https://api.comerc.app.br
    description: Production (example — replace with your deployment URL)
  - url: http://localhost:8080
    description: Local development

security:
  - ApiKeyAuth: []

tags:
  - name: cnpj
    description: Public CNPJ lookup (v1)
  - name: health
    description: Probes (no authentication)

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "Format: ocnpj_live_<32 lowercase hex characters>"

  schemas:
    ErrorResponse:
      type: object
      required: [error, message, code]
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: invalid_cnpj
        message:
          type: string
          example: invalid cnpj
        code:
          type: integer
          example: 400

    CNAEInfo:
      type: object
      properties:
        codigo:
          type: string
          example: "6201501"
        descricao:
          type: string
          example: Desenvolvimento de programas de computador sob encomenda

    Endereco:
      type: object
      properties:
        logradouro:
          type: string
        numero:
          type: string
        complemento:
          type: string
        bairro:
          type: string
        cep:
          type: string
        uf:
          type: string
          example: SP
        municipio:
          type: string

    SocioSummary:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
        qualificacao:
          type: string
        data_entrada_sociedade:
          type: string
          format: date

    SimplesFlags:
      type: object
      properties:
        opcao_simples:
          type: string
        data_opcao_simples:
          type: string
          format: date
        data_exclusao_simples:
          type: string
          format: date
        opcao_mei:
          type: string
        data_opcao_mei:
          type: string
          format: date
        data_exclusao_mei:
          type: string
          format: date

    PublicCNPJResponse:
      type: object
      required: [cnpj, razao_social, socios]
      properties:
        cnpj:
          type: string
          pattern: '^\d{14}$'
          example: "00000000000191"
        razao_social:
          type: string
        nome_fantasia:
          type: string
        situacao_cadastral:
          type: string
          description: RFB code (02 = active)
        uf:
          type: string
        municipio:
          type: string
        cnae_principal:
          $ref: "#/components/schemas/CNAEInfo"
        endereco:
          $ref: "#/components/schemas/Endereco"
        telefone:
          type: string
        email:
          type: string
        socios:
          type: array
          items:
            $ref: "#/components/schemas/SocioSummary"
        simples:
          $ref: "#/components/schemas/SimplesFlags"

paths:
  /api/v1/cnpj/{cnpj}:
    get:
      operationId: getCnpj
      tags: [cnpj]
      summary: Lookup establishment by CNPJ
      description: Returns establishment, partners, and Simples flags for a 14-digit CNPJ.
      parameters:
        - name: cnpj
          in: path
          required: true
          description: 14-digit CNPJ (digits only)
          schema:
            type: string
            pattern: '^\d{14}$'
          example: "00000000000191"
      responses:
        "200":
          description: Establishment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicCNPJResponse"
        "400":
          description: Invalid CNPJ format or check digits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: invalid_cnpj
                message: invalid cnpj
                code: 400
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value:
                    error: missing_api_key
                    message: missing api key
                    code: 401
                invalid:
                  value:
                    error: invalid_api_key
                    message: invalid api key
                    code: 401
        "403":
          description: Client suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: client_suspended
                message: client suspended
                code: 403
        "404":
          description: CNPJ not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: cnpj_not_found
                message: cnpj not found
                code: 404
        "429":
          description: Rate limit or monthly quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                rate:
                  value:
                    error: rate_limit_exceeded
                    message: rate limit exceeded
                    code: 429
                quota:
                  value:
                    error: quota_exceeded
                    message: quota exceeded
                    code: 429
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Query timeout

  /readyz:
    get:
      operationId: readiness
      tags: [health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: API and database ready
        "503":
          description: Dependency unavailable
