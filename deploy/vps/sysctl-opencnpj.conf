# OpenCNPJ production VPS — kernel tuning (16 GB RAM host)
# Apply: sudo cp deploy/vps/sysctl-opencnpj.conf /etc/sysctl.d/99-opencnpj.conf && sudo sysctl --system
# Do NOT copy import-dev Postgres flags from docker-compose (see deploy/vps/README.md).

# Memory — favor keeping Postgres pages in RAM
vm.swappiness = 1
vm.dirty_ratio = 10
vm.dirty_background_ratio = 3

# Shared memory for PostgreSQL shared_buffers=4GB (Phase 2 production profile)
kernel.shmmax = 4294967296
kernel.shmall = 2097152

# TCP — API + pgBouncer connection backlog
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 8192
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# Optional: reduce TIME_WAIT pressure under high churn
net.ipv4.tcp_tw_reuse = 1
